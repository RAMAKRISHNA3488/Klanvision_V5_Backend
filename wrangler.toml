name = "klanvision-v5-backend"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Bundling ─────────────────────────────────────────────────────────────────
[[rules]]
type = "ESModule"
globs = ["**/*.js"]

# ─── Workers Settings ────────────────────────────────────────────────────────
# Cloudflare Workers free plan: 100k requests/day

# ─── D1 Database (SQLite) ──────────────────────────────────────────────────────
# To enable D1:
#   1. Run: npx wrangler d1 create klanvision-db
#   2. Paste the generated database_id below.
[[d1_databases]]
binding = "DB"
database_name = "klanvision-db"
database_id = "0818db46-654c-4f90-b895-e600a17f6994"

# ─── Environment Variables (non-secret) ──────────────────────────────────────
[vars]
CORS_ORIGIN = "https://www.klanvision.com,https://klanvision.com"

# ─── Cron Triggers ───────────────────────────────────────────────────────────
# Runs purgeOldActivities() every day at 00:00 UTC
[triggers]
crons = ["0 0 * * *"]

# ─── Secrets (set via Cloudflare Dashboard → Settings → Variables, or CLI) ───
# Via CLI:
#   npx wrangler secret put CORS_ORIGIN
#   npx wrangler secret put SEED_SECRET ← any strong string for /api/admin/seed
